// ── localStorage ──────────────────────────────────────────────────────────────

function useStorage(key, fallback) {
  const [val, setVal] = useState(() => {
    try {
      const ls = localStorage.getItem(key);
      if (!ls) return fallback;
      const stored = JSON.parse(ls);
      if (!Array.isArray(stored) || stored.length === 0) return fallback;
      const storedIds = new Set(stored.map(i => i.id));
      const newDefaults = fallback.filter(i => !storedIds.has(i.id));
      return [...stored, ...newDefaults];
    } catch {
      try { localStorage.removeItem(key); } catch {}
      return fallback;
    }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }, [key, val]);
  return [val, setVal, () => {
    try { localStorage.removeItem(key); } catch {}
    setVal(fallback);
  }];
}

function useLs(key, fallback) {
  const [val, setVal] = useState(() => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ── eBay API ──────────────────────────────────────────────────────────────────

async function fetchEbayPrices(query) {
  try {
    const url = `https://svcs.ebay.com/services/search/FindingService/v1?OPERATION-NAME=findCompletedItems&SERVICE-VERSION=1.0.0&SECURITY-APPNAME=${EBAY_APP_ID}&RESPONSE-DATA-FORMAT=JSON&REST-PAYLOAD&keywords=${encodeURIComponent(query)}&itemFilter(0).name=SoldItemsOnly&itemFilter(0).value=true&itemFilter(1).name=Condition&itemFilter(1).value=3000&sortOrder=EndTimeSoonest&paginationInput.entriesPerPage=5`;
    const res = await fetch(url);
    if (!res.ok) return { corsBlocked: true };
    const data = await res.json();
    const items = data?.findCompletedItemsResponse?.[0]?.searchResult?.[0]?.item;
    if (!items?.length) return null;
    const prices = items.map(i => parseFloat(i.sellingStatus?.[0]?.currentPrice?.[0]?.__value__)).filter(p => p > 0);
    if (!prices.length) return null;
    const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
    return {
      avg: avg.toFixed(0),
      avgEur: Math.round(avg * USD_TO_EUR),
      min: Math.min(...prices).toFixed(0),
      minEur: Math.round(Math.min(...prices) * USD_TO_EUR),
      max: Math.max(...prices).toFixed(0),
      maxEur: Math.round(Math.max(...prices) * USD_TO_EUR),
      count: prices.length,
      ts: Date.now(),
    };
  } catch (e) {
    return { corsBlocked: true };
  }
}

const toEur = usd => Math.round(parseFloat(usd) * USD_TO_EUR);
const fmt   = (n, d = 0) => Number(n).toFixed(d);

      .then(r => (r.ok ? r.json() : null))
      .then(d => { if (alive) setPrices(d && d.cards ? d.cards : {}); })
      .catch(() => { if (alive) setPrices({}); });
    return () => { alive = false; };
  }, []);
  return prices;
}
// Prix RAW en euros pour une entrée prices.json (ou null)
const rawEur = entry => {
  if (!entry || entry.raw == null) return null;
  return entry.currency === "USD" ? Math.round(entry.raw * USD_TO_EUR) : Math.round(entry.raw);
};
// Données de courbe RAW (en €) : historique réel accumulé, sinon série courte
// dérivée des moyennes CardMarket (30j / 7j / 1j / auj.). Renvoie [{date, raw}] ou null.
const rawChartData = entry => {
  if (!entry) return null;
  const conv = v => (v == null ? null : (entry.currency === "USD" ? Math.round(v * USD_TO_EUR) : Math.round(v)));
  if (Array.isArray(entry.history) && entry.history.length >= 2) {
    return entry.history.map(h => ({ date: (h.t || "").slice(5), raw: conv(h.raw) })).filter(d => d.raw != null);
  }
  if (entry.source === "cardmarket") {
    const pts = [];
    if (entry.avg30 != null) pts.push({ date: "30j", raw: conv(entry.avg30) });
    if (entry.avg7  != null) pts.push({ date: "7j",  raw: conv(entry.avg7) });
    if (entry.avg1  != null) pts.push({ date: "1j",  raw: conv(entry.avg1) });
    pts.push({ date: "auj.", raw: conv(entry.raw) });
    const uniq = pts.filter(p => p.raw != null);
    return uniq.length >= 2 ? uniq : null;
  }
  return null;
};

// localStorage pt_purchase_v1 : { [cardId]: number | "booster" }.
// Résolution: valeur saisie → sinon prix payé connu (owned) → sinon "booster".
const PURCHASE_KEY = "pt_purchase_v1";
const resolvePurchase = (store, card) => {
  if (store && store[card.id] !== undefined) return store[card.id];
  if (card && card.price > 0) return card.price;
  return "booster";
};
const purchaseLabel = v => (v === "booster" || v == null ? "Booster" : `${v}€`);

const relTime = ts => {
  if (!ts) return "";
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return "à l'instant";
  if (m < 60) return `il y a ${m}min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h / 24)}j`;
};

// ── SvgLineChart ──────────────────────────────────────────────────────────────

function SvgLineChart({ data, lines }) {
  const W = 320, H = 160, PAD = { top: 10, right: 10, bottom: 24, left: 44 };
  const IW = W - PAD.left - PAD.right;
  const IH = H - PAD.top - PAD.bottom;
  const [hover, setHover] = useState(null);

  const allVals = lines.flatMap(l => data.map(d => d[l.key]));
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const range = maxV - minV || 1;

  const xPos = i => PAD.left + (i / (data.length - 1)) * IW;
  const yPos = v => PAD.top + IH - ((v - minV) / range) * IH;

  const pathD = (key) =>
    data.map((d, i) => `${i === 0 ? "M" : "L"}${xPos(i).toFixed(1)},${yPos(d[key]).toFixed(1)}`).join(" ");

  const yTicks = [minV, minV + range * 0.5, maxV].map(v => Math.round(v));

  return (
    <div style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${T.border}`, borderRadius: 12, padding: "12px 0 8px", marginBottom: 24, position: "relative" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}
        onMouseLeave={() => setHover(null)}>
        {/* Grid */}
        {yTicks.map((v, i) => (
          <g key={i}>
            <line x1={PAD.left} x2={W - PAD.right} y1={yPos(v)} y2={yPos(v)} stroke="rgba(255,255,255,0.05)" strokeDasharray="3,3" />
            <text x={PAD.left - 6} y={yPos(v) + 4} textAnchor="end" fontSize={9} fill={T.textMuted}>{v}€</text>
          </g>
        ))}
        {/* X labels */}
        {data.map((d, i) => (
          <text key={i} x={xPos(i)} y={H - 4} textAnchor="middle" fontSize={9} fill={T.textMuted}>{d.date}</text>
        ))}
        {/* Lines */}
        {lines.map(l => (
          <path key={l.key} d={pathD(l.key)} fill="none" stroke={l.color} strokeWidth={2} strokeLinejoin="round" />
        ))}
        {/* Dots + hover zones */}
        {data.map((d, i) => (
          <g key={i} onMouseEnter={() => setHover(i)} style={{ cursor: "crosshair" }}>
            <rect x={xPos(i) - 16} y={PAD.top} width={32} height={IH} fill="transparent" />
            {lines.map(l => (
              <circle key={l.key} cx={xPos(i)} cy={yPos(d[l.key])} r={hover === i ? 5 : 3} fill={l.color} />
            ))}
          </g>
        ))}
        {/* Hover vertical line */}
        {hover !== null && (
          <line x1={xPos(hover)} x2={xPos(hover)} y1={PAD.top} y2={PAD.top + IH} stroke="rgba(255,255,255,0.15)" strokeWidth={1} />
        )}
      </svg>
      {/* Tooltip */}
      {hover !== null && (
        <div style={{ position: "absolute", top: 10, right: 14, background: T.surface, border: `1px solid ${T.borderMid}`, borderRadius: 8, padding: "6px 10px", fontSize: 11, pointerEvents: "none" }}>
          <div style={{ color: T.text, fontWeight: 600, marginBottom: 4 }}>{data[hover].date}</div>
          {lines.map(l => (
            <div key={l.key} style={{ color: l.color, fontVariantNumeric: "tabular-nums" }}>{l.label} : {data[hover][l.key]}€</div>
          ))}
        </div>
      )}
      {/* Legend */}
      {lines.length > 1 && (
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 4 }}>
          {lines.map(l => (
            <div key={l.key} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10, color: l.color }}>
              <div style={{ width: 16, height: 2, background: l.color, borderRadius: 1 }} />
              {l.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Chargement d'images — cascade multi-sources ──────────────────────────────
// Pour une carte FR/JP, l'illustration native est cherchée dans l'ordre :
//   1. CDN TCGdex direct (assets.tcgdex.net/{lang}/...) deviné depuis tcgdex="SETCODE-num"
//   2. API TCGdex (langue de la carte) — renvoie le chemin exact même si le numéro diffère
//   3. CDN LimitlessTCG (toutes variantes de rareté), même langue
//   4. (JP) images hébergées dans le repo (workflow GitHub Actions) puis pokemon-card.com
//      direct, puis Wayback Machine en dernier filet
//   5. API TCGdex en anglais (repli) puis pokemontcg.io (dernier recours, EN uniquement)
// Ces requêtes passent par une balise <img> (tryImg) plutôt que fetch() quand c'est possible :
// ça évite les soucis de CORS/ad-blockers qui bloquent les appels fetch() vers des CDN tiers.
// Toute image qui n'est pas dans la langue native de la carte est marquée fallbackEn :
// l'UI affiche un badge "EN" + propose à l'utilisateur de coller une URL d'image native.
// Si rien n'est trouvé : l'UI propose à l'utilisateur de coller une URL d'image (voir CardSlot / panneaux détail).

const LANG_API_CODE = { FR: "fr", JP: "ja", EN: "en" };

// Codes pokemon-card.com (site officiel JP) confirmés disponibles pour ces sets Mega/SV récents.
const POKEMON_CARD_JP_SETS = ["M2a", "M3", "M4", "SV11B"];
const LTCG_VARIANTS = ["P", "R", "RR", "AR", "SAR", "SR", "SIR", "IR", "UR", "HR", "MA"];

// Signature des champs source d'une carte : si elle change (correction de tcgdex/ptcgioQ
// suite à une erreur de langue détectée), le cache est automatiquement invalidé et l'image
// est ré-interrogée — sans ça une correction de données resterait masquée par l'ancien cache.
const sig = c => `${c.lang}|${c.tcgdex || ""}|${c.ptcgioQ || ""}`;

function useCardImages(cards) {
  const CACHE_KEY = "pt_img_cache_v7";
  const OVR_KEY   = "pt_img_overrides";
  const [cache, setCache] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CACHE_KEY) || "{}"); } catch { return {}; }
  });
  const [overrides, setOverrides] = useState(() => {
    try { return JSON.parse(localStorage.getItem(OVR_KEY) || "{}"); } catch { return {}; }
  });

  const setOverride = useCallback((id, url) => {
    setOverrides(prev => {
      const next = { ...prev, [id]: url };
      try { localStorage.setItem(OVR_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  // Une carte FR/JP dont la dernière résolution n'a donné qu'un repli EN (ou rien)
  // n'est jamais considérée comme "fraîche" : une des sources peut avoir ajouté
  // l'illustration native depuis, donc on retente à chaque chargement jusqu'à ce
  // qu'elle soit trouvée.
  const isStale = (entry, c) => {
    if (!entry || entry.sig !== sig(c)) return true;
    if (c.lang !== "EN" && (!entry.data || entry.data.fallbackEn)) return true;
    return false;
  };

  useEffect(() => {
    const toFetch = cards.filter(c => !c.img && !overrides[c.id] && isStale(cache[c.id], c));
    if (!toFetch.length) return;
    let alive = true;
    const save = (id, signature, data) => setCache(p => {
      const n = { ...p, [id]: { sig: signature, data } };
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(n)); } catch {}
      return n;
    });

    // Teste si une URL charge en tant qu'image (ne nécessite pas CORS, contourne
    // les protections hotlink qui n'autorisent que les requêtes sans Referer).
    const tryImg = (url, ms = 4000) => new Promise(res => {
      const t = new Image();
      t.referrerPolicy = "no-referrer";
      const timer = setTimeout(() => { t.src = ""; res(false); }, ms);
      t.onload  = () => { clearTimeout(timer); res(true); };
      t.onerror = () => { clearTimeout(timer); res(false); };
      t.src = url;
    });

    const tcgdexOne = async (lang, id) => {
      try {
        const r = await fetch(`https://api.tcgdex.net/v2/${lang}/cards/${id}`);
        if (!r.ok) return null;
        const d = await r.json();
        return d?.image ? `${d.image}/high.webp` : null;
      } catch { return null; }
    };
    const tcgdexLookup = async (lang, tcgdex) => {
      const [setCode, num] = tcgdex.split("-");
      for (const n of [num, num.padStart(3, "0")]) {
        const url = await tcgdexOne(lang, `${setCode}-${n}`);
        if (url) return url;
      }
      return null;
    };
    const ptcgio = async (q) => {
      try {
        const r = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(q)}&pageSize=1&select=images`);
        if (!r.ok) return null;
        const d = await r.json();
        return d?.data?.[0]?.images?.large ?? null;
      } catch { return null; }
    };

    // Cascade pour l'illustration NATIVE (FR ou JP) d'une carte tcgdex="SETCODE-num".
    // Retourne une URL dès qu'une source répond, sans appel réseau superflu.
    const nativeLookup = async (card) => {
      const [setCode, numRaw] = card.tcgdex.split("-");
      const numPad = numRaw.padStart(3, "0");
      const langCode = LANG_API_CODE[card.lang] || "en";
      const series = setCode.startsWith("SV") ? "SV" : (setCode.startsWith("M") ? "M" : null);

      // 1. CDN TCGdex direct (deviné)
      if (series) {
        for (const n of [numPad, numRaw]) {
          const url = `https://assets.tcgdex.net/${langCode}/${series}/${setCode}/${n}/high.webp`;
          if (await tryImg(url)) return url;
        }
      }

      // 2. API TCGdex (langue native) — chemin exact même si le numéro local diffère
      const apiUrl = await tcgdexLookup(langCode, card.tcgdex);
      if (apiUrl) return apiUrl;

      // 3. CDN LimitlessTCG, toutes variantes de rareté
      const n = parseInt(numRaw, 10);
      for (const v of LTCG_VARIANTS) {
        const url = `https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/${setCode}/${setCode}_${n}_${v}_${card.lang}_LG.png`;
        if (await tryImg(url, 2000)) return url;
      }

      if (card.lang === "JP") {
        // 4. Images hébergées dans le repo (workflow GitHub Actions)
        if (POKEMON_CARD_JP_SETS.includes(setCode)) {
          const repoUrl = `https://raw.githubusercontent.com/thomgros/pokemon-tracker/main/cards/${setCode}/${numPad}.jpg`;
          if (await tryImg(repoUrl)) return repoUrl;

          // 5. pokemon-card.com direct (site officiel JP), sans Referer
          const base = `https://www.pokemon-card.com/assets/images/card_images/large/${setCode}/${numPad}.jpg`;
          if (await tryImg(base)) return base;

          // 6. Wayback Machine — dernier filet si pokemon-card.com bloque
          const archiveUrl = `https://web.archive.org/web/2im_/${base}`;
          if (await tryImg(archiveUrl, 6000)) return archiveUrl;
        }
      }

      return null;
    };

    (async () => {
      for (const card of toFetch) {
        if (!alive) return;
        let url = null, fallbackEn = false;

        if (card.tcgdex) {
          url = await nativeLookup(card);
          if (!url && card.lang !== "EN") {
            url = await tcgdexLookup("en", card.tcgdex);
            if (url) fallbackEn = true;
          }
        }
        // pokemontcg.io ne référence que des cartes EN : tout résultat venant de là pour
        // une carte FR/JP est donc un repli EN, jamais l'illustration native — il doit
        // être signalé comme tel (badge + proposition d'image), pas affiché en silence.
        if (!url && card.ptcgioQ) {
          url = await ptcgio(card.ptcgioQ);
          if (url && card.lang !== "EN") fallbackEn = true;
        }

        save(card.id, sig(card), url ? { url, fallbackEn } : null);
        if (url) await new Promise(r => setTimeout(r, 120));
      }
    })();
    return () => { alive = false; };
  }, [cards.map(c => c.id).join(",")]);

  const images = {};
  for (const c of cards) {
    if (overrides[c.id]) { images[c.id] = { url: overrides[c.id], override: true }; continue; }
    if (c.img) { images[c.id] = { url: c.img }; continue; }
    images[c.id] = (cache[c.id] && cache[c.id].sig === sig(c)) ? cache[c.id].data : undefined; // undefined = en cours de chargement (ou cache obsolète)
  }
  return { images, setOverride };
}

// ── Panneau "ajouter une image" ───────────────────────────────────────────────
// Affiché quand une carte FR/JP/EN n'a pu être résolue automatiquement, ou quand
// seul un repli EN a été trouvé pour une carte FR/JP — conformément à la consigne :
// langue native d'abord, sinon demander une image à l'utilisateur, sinon EN en dernier recours.

function ImageHelp({ card, imgData, onSetOverride, color, force }) {
  const [url, setUrl] = useState("");
  const missing = imgData === null;
  const isEnFallback = imgData?.fallbackEn;
  // Toujours disponible en mode `force` (bouton « Changer l'illustration ») ;
  // sinon affiché seulement si image manquante ou repli EN sur une carte FR/JP.
  if (!force && !missing && !isEnFallback) return null;
  const onFile = e => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const rd = new FileReader();
    rd.onload = () => { onSetOverride(card.id, rd.result); setUrl(""); };
    rd.readAsDataURL(f);
  };
  const tone = missing ? "#f87171" : isEnFallback ? "#facc15" : (color || T.accent);
  const title = missing ? "📷 Image introuvable automatiquement"
    : isEnFallback ? `🇬🇧 Illustration EN affichée — ${card.lang} native introuvable`
    : "🖼️ Changer l'illustration";
  return (
    <div style={{ marginTop: 8, padding: "9px 11px", background: `${tone}12`, border: `1px solid ${tone}3d`, borderRadius: 10 }} onClick={e => e.stopPropagation()}>
      <div style={{ fontSize: 11, color: tone, fontWeight: 700, marginBottom: 5 }}>{title}</div>
      <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 7 }}>
        {card.lang !== "EN"
          ? `Colle une URL de l'illustration ${LANG_FLAG[card.lang]} ${card.lang}, ou importe un fichier.`
          : "Colle une URL d'image, ou importe un fichier."}
      </div>
      <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
        <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://…" style={{ ...css.input, fontSize: 11, padding: "6px 9px" }} />
        <button onClick={e => { e.stopPropagation(); if (url.trim()) { onSetOverride(card.id, url.trim()); setUrl(""); } }} style={{ ...css.btn("primary"), padding: "6px 12px", fontSize: 11 }}>OK</button>
      </div>
      <label style={{ ...css.btn(), padding: "6px 10px", fontSize: 11, display: "inline-flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
        📁 Importer un fichier
        <input type="file" accept="image/*" onChange={onFile} style={{ display: "none" }} />
      </label>
    </div>
  );
}

// ── Prix d'achat éditable + bande économique ─────────────────────────────────

function PurchaseEditor({ card, store, onSet }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState("");
  const cur = resolvePurchase(store, card);
  const isBooster = cur === "booster" || cur == null;
  const begin = e => { e && e.stopPropagation(); setV(isBooster ? "" : String(cur)); setEditing(true); };
  const save = e => { e && e.stopPropagation(); const n = parseFloat(String(v).replace(",", ".")); onSet(card.id, isNaN(n) ? "booster" : Math.round(n * 100) / 100); setEditing(false); };
  const booster = e => { e && e.stopPropagation(); onSet(card.id, "booster"); setEditing(false); };
  if (editing) {
    return (
      <div onClick={e => e.stopPropagation()} style={{ display: "flex", gap: 4, alignItems: "center", justifyContent: "center", flexWrap: "wrap" }}>
        <input autoFocus type="text" inputMode="decimal" value={v} onChange={e => setV(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") save(e); if (e.key === "Escape") setEditing(false); }}
          placeholder="€" style={{ ...css.input, width: 62, padding: "3px 7px", fontSize: 12, textAlign: "center" }} />
        <button onClick={save} style={{ ...css.btn("primary"), padding: "3px 8px", fontSize: 10 }}>OK</button>
        <button onClick={booster} title="Marquer comme trouvée en booster" style={{ ...css.btn(), padding: "3px 8px", fontSize: 10 }}>Booster</button>
      </div>
    );
  }
  return (
    <button onClick={begin} title="Modifier le prix d'achat" style={{
      background: "transparent", border: "none", cursor: "pointer", fontFamily: "inherit",
      fontSize: 14, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 5,
      color: isBooster ? T.textSub : T.text,
    }}>
      {isBooster ? <span style={{ fontStyle: "italic", fontWeight: 600 }}>Booster</span> : `${cur}€`}
      <span style={{ fontSize: 10, opacity: 0.45 }}>✎</span>
    </button>
  );
}

// Bande de 2-3 tuiles : Prix d'achat (éditable) · RAW indicatif · Plus-value.
function EconoStrip({ card, rawEntry, store, onSetPurchase, refValue, color }) {
  const raw = rawEur(rawEntry);
  const cur = resolvePurchase(store, card);
  const paid = typeof cur === "number" ? cur : null;
  const ref = refValue != null ? refValue : raw;
  const plus = (paid != null && ref != null) ? Math.round(ref - paid) : null;
  const tile = (label, node, c, extra) => (
    <div style={{ background: `${c}10`, border: `1px solid ${c}30`, borderRadius: 10, padding: "8px 6px", textAlign: "center", ...extra }}>
      <div style={{ fontSize: 8, color: c, opacity: 0.85, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 700, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 700, color: c, fontVariantNumeric: "tabular-nums", lineHeight: 1.1 }}>{node}</div>
    </div>
  );
  return (
    <div style={{ display: "grid", gridTemplateColumns: plus != null ? "repeat(3,1fr)" : "repeat(2,1fr)", gap: 6, marginTop: 10 }}>
      {tile("Prix d'achat", <PurchaseEditor card={card} store={store} onSet={onSetPurchase} />, color)}
      {tile("RAW indicatif", raw != null ? `~${raw}€` : "—", "#60a5fa")}
      {plus != null && tile("Plus-value", `${plus >= 0 ? "+" : ""}${plus}€`, plus >= 0 ? "#4ade80" : "#f87171")}
    </div>
  );
}

function BinderView({ cards, color }) {
  const [page, setPage]         = useState(0);
  const [selected, setSelected] = useState(null);
  const [imgEdit, setImgEdit]   = useState(false);
  const { images, setOverride } = useCardImages(cards);
  const prices                  = usePrices();
  const [purchase, setPurchase] = useLs(PURCHASE_KEY, {});
  const setP = (id, val) => setPurchase(p => ({ ...p, [id]: val }));
  useEffect(() => { setImgEdit(false); }, [selected && selected.id]);

  const parseVal = s => parseFloat((s || "0").replace(/[^0-9.]/g, "")) || 0;
  const grouped = {};
  cards.forEach(c => { (grouped[c.set] = grouped[c.set] || []).push(c); });
  const setPages = Object.entries(grouped)
    .map(([setName, setCards]) => ({
      setName,
      cards: setCards.sort((a, b) => parseVal(b.value) - parseVal(a.value)),
    }))
    .sort((a, b) => parseVal(b.cards[0]?.value) - parseVal(a.cards[0]?.value))
    .flatMap(({ setName, cards }) => {
      const pages = [];
      for (let i = 0; i < cards.length; i += BINDER_PAGE_SIZE)
        pages.push({ setName, cards: cards.slice(i, i + BINDER_PAGE_SIZE), totalInSet: cards.length });
      return pages;
    });

  const totalPages = Math.max(1, setPages.length);
  const curPage    = setPages[Math.min(page, totalPages - 1)] || { setName: "", cards: [] };
  const pageCards  = Array.from({ length: BINDER_PAGE_SIZE }, (_, i) => curPage.cards[i] ?? null);

  return (
    <div>
      {/* Classeur */}
      <div style={{
        borderRadius: 14, overflow: "hidden",
        boxShadow: `0 16px 48px rgba(0,0,0,0.8), 0 0 0 1px ${color}22`,
        display: "flex", marginBottom: 12,
      }}>
        {/* Spine anneaux */}
        <div style={{
          width: 28, flexShrink: 0,
          background: "linear-gradient(to right, #0c0703, #1c0f07, #231206)",
          display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
          padding: "10px 0",
          borderRight: "1px solid rgba(255,255,255,0.04)",
        }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{
              width: 15, height: 15, borderRadius: "50%",
              background: "linear-gradient(135deg, #c0c0c0 0%, #808080 40%, #404040 70%, #a0a0a0 100%)",
              boxShadow: "0 2px 5px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.25)",
              border: "1px solid #1a1a1a",
            }} />
          ))}
        </div>

        {/* Page */}
        <div style={{
          flex: 1,
          background: "linear-gradient(160deg, #1d1208 0%, #261506 60%, #1a1005 100%)",
          padding: "12px 12px 12px 8px",
          position: "relative",
        }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gridTemplateRows: "repeat(3, 1fr)", gap: 7 }}>
            {pageCards.map((card, i) => {
              // images[card.id] applique override > card.img > cascade (override gagne toujours,
              // même sur une image codée en dur — permet de corriger une mauvaise langue).
              const imgData = card ? (images[card.id] ?? (card.img ? { url: card.img } : undefined)) : undefined;
              return (
                <CardSlot key={i}
                  card={card} imgData={imgData}
                  selected={selected?.id === card?.id} color={color}
                  onClick={() => card && setSelected(selected?.id === card.id ? null : card)}
                />
              );
            })}
          </div>

          {/* Overlay carte agrandie */}
          {selected && (() => {
            const imgUrl = images[selected.id]?.url || selected.img;
            return (
              <div onClick={() => setSelected(null)} style={{
                position: "absolute", inset: 0,
                background: "rgba(0,0,0,0.80)",
                display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center",
                zIndex: 10, cursor: "pointer",
              }}>
                {imgUrl && (
                  <img src={imgUrl} alt={selected.name}
                    style={{
                      width: "64%", maxHeight: "72%",
                      aspectRatio: "5/7", objectFit: "contain",
                      borderRadius: 10,
                      boxShadow: `0 8px 40px rgba(0,0,0,0.9), 0 0 20px ${color}33`,
                    }}
                  />
                )}
                <div style={{ marginTop: 10, textAlign: "center", padding: "0 12px" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#fff" }}>
                    {LANG_FLAG[selected.lang]} {selected.fullName}
                  </div>
                  {selected.value && (
                    <div style={{ fontSize: 16, color: "#4ade80", fontWeight: 700, marginTop: 3 }}>
                      {selected.value}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
        </div>
      </div>

      {/* Panneau détail carte sélectionnée */}
      {selected && (
        <div className="pt-pop" style={{ ...css.card, border: `1px solid ${color}44`, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.text, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {LANG_FLAG[selected.lang]} {selected.fullName}
            </div>
            <div style={{ fontSize: 11, color: T.textMuted, flexShrink: 0 }}>{selected.set.split(" · ")[0]}</div>

              <div style={{ fontSize: 9.5, color: T.textMuted, marginTop: 7, textAlign: "center" }}>Prix RAW auto indisponible pour cette carte</div>

          })()}

          {/* Courbe d'évolution RAW */}
          {(() => {
            const cd = rawChartData(prices?.[selected.id]);
            if (!cd) return null;
            const diff = cd[cd.length - 1].raw - cd[0].raw;
            return (
              <div style={{ marginTop: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>

                  <span style={{ fontSize: 12, fontWeight: 700, color: diff >= 0 ? "#4ade80" : "#f87171" }}>{diff >= 0 ? "+" : ""}{diff}€</span>
                </div>
                <SvgLineChart data={cd} lines={[{ key: "raw", color: "#60a5fa", label: "RAW" }]} />
              </div>
            );
          })()}

          <div style={{ marginTop: 9, display: "flex", justifyContent: "flex-end" }}>
            <button onClick={() => setImgEdit(v => !v)} style={{ ...css.btn(), padding: "4px 10px", fontSize: 10 }}>
              🖼️ {imgEdit ? "Fermer" : "Changer l'illustration"}
            </button>
          </div>
          <ImageHelp card={selected} imgData={images[selected.id]} onSetOverride={setOverride} color={color} force={imgEdit} />
        </div>
      )}

      {/* Pagination */}
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 12, marginBottom: 4 }}>

        <button onClick={() => { setPage(p => Math.min(totalPages - 1, p + 1)); setSelected(null); }}

          style={{ ...css.btn(), opacity: page === totalPages - 1 ? 0.3 : 1, padding: "5px 12px" }}>→</button>
      </div>
    </div>
  );

        {LANG_TABS_CFG.map(t => {
          const cnt    = gradingCards.filter(c => c.lang === t.id).length;
          const active = lang === t.id;
          return (
            <button key={t.id} onClick={() => { setLang(t.id); setSelected(null); }} style={{
              flex:1, padding:"8px 4px", borderRadius:10, cursor:"pointer", fontFamily:"inherit",
              background: active ? `${t.color}18` : "transparent",
              color: active ? t.color : T.textMuted,

              display:"flex", flexDirection:"column", alignItems:"center", gap:2,

              <span style={{ fontSize:10, fontWeight: active ? 700 : 400 }}>{t.label}</span>
              <span style={{ fontSize:9, opacity:0.6 }}>{cnt} carte{cnt!==1?"s":""}</span>
            </button>

        })}
      </div>

      {/* Classeur grading */}
      <div style={{ borderRadius:14, overflow:"hidden", boxShadow:`0 16px 48px rgba(0,0,0,0.8), 0 0 0 1px ${curColor}22`, display:"flex", marginBottom:12 }}>
        {/* Spine */}
        <div style={{ width:28, flexShrink:0, background:"linear-gradient(to right,#0c0703,#1c0f07,#231206)", display:"flex", flexDirection:"column", justifyContent:"space-evenly", alignItems:"center", padding:"10px 0", borderRight:"1px solid rgba(255,255,255,0.04)" }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{ width:15, height:15, borderRadius:"50%", background:"linear-gradient(135deg,#c0c0c0 0%,#808080 40%,#404040 70%,#a0a0a0 100%)", boxShadow:"0 2px 5px rgba(0,0,0,0.9),inset 0 1px 2px rgba(255,255,255,0.25)", border:"1px solid #1a1a1a" }} />
          ))}
        </div>
        {/* Grille */}
        <div style={{ flex:1, background:"linear-gradient(160deg,#1d1208 0%,#261506 60%,#1a1005 100%)", padding:"12px 12px 12px 8px", position:"relative" }}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gridTemplateRows:"repeat(3,1fr)", gap:7 }}>
            {pageCards.map((card, i) => {
              const imgData  = card ? imgCache[card.id] : undefined;
              const url      = imgData?.url;
              const loading  = card && imgData === undefined;
              const isSel    = selected?.id === card?.id;
              const sGraded  = card?.status === "graded";
              const sBadge   = card?.status === "grading";
              const bdrCol   = sGraded ? "#4ade80" : sBadge ? "#60a5fa" : "#fb923c";
              return (
                <div key={i} onClick={() => card && setSelected(isSel ? null : card)} style={{
                  aspectRatio:"5/7", borderRadius:7, overflow:"hidden",
                  background: card ? "rgba(0,0,0,0.22)" : "rgba(0,0,0,0.15)",
                  border: card ? `2px solid ${isSel ? T.accent : bdrCol + "55"}` : "2px dashed rgba(255,255,255,0.06)",
                  cursor: card ? "pointer" : "default",
                  boxShadow: card ? "0 4px 12px rgba(0,0,0,0.7)" : "none",
                  transform: isSel ? "scale(1.06)" : "scale(1)",
                  transition:"transform 0.15s,border-color 0.15s",
                  position:"relative", display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  {card && url && (
                    <img src={url} alt={card.name}
                      style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover" }}
                      onError={e => e.target.style.display="none"}
                    />
                  )}
                  {card && !url && (
                    <div style={{ padding:4, textAlign:"center", zIndex:1 }}>
                      {loading
                        ? <div style={{ fontSize:16, opacity:0.2 }}>⏳</div>
                        : imgData === null
                          ? <div style={{ fontSize:16, opacity:0.3 }}>📷</div>
                          : <>
                              <div style={{ fontSize:8, color:T.textSub, fontWeight:600, lineHeight:1.3, wordBreak:"break-word" }}>{card.name}</div>
                              <div style={{ fontSize:7, color:T.textMuted, marginTop:2 }}>{card.set}</div>
                            </>
                      }
                    </div>
                  )}
                  {/* Badge statut */}
                  {card && (
                    <div style={{
                      position:"absolute", bottom:3, left:"50%", transform:"translateX(-50%)",
                      background: sGraded ? "rgba(74,222,128,0.88)" : sBadge ? "rgba(96,165,250,0.88)" : "rgba(251,146,60,0.88)",
                      borderRadius:4, padding:"1px 5px", fontSize:7, fontWeight:700, color:"#000",
                      whiteSpace:"nowrap", zIndex:2, letterSpacing:"0.03em",
                    }}>
                      {sGraded ? `✓ ${GRADING_META[card.id]?.grade || "PSA"}` : sBadge ? "⏳ PSA" : "📬 À envoyer"}
                    </div>
                  )}
                  {!card && <div style={{ fontSize:18, opacity:0.07, color:"#fff" }}>◇</div>}
                </div>
              );
            })}
          </div>

          {/* Overlay carte gradée agrandie */}
          {selected && (() => {
            const imgUrl = imgCache[selected.id]?.url;
            const selMeta = GRADING_META[selected.id];
            const statusColor = selected.status === "graded" ? "#4ade80" : selected.status === "grading" ? "#60a5fa" : "#fb923c";
            const statusLabel = selected.status === "graded" ? `Gradé ${selMeta?.grade || "PSA"}` : selected.status === "grading" ? "En grading PSA" : "À envoyer";
            const lastH = GRADING_HISTORY[selected.id]?.h;
            const lastVal = lastH ? lastH[lastH.length - 1] : null;
            return (
              <div onClick={() => setSelected(null)} style={{
                position:"absolute", inset:0,
                background:"rgba(0,0,0,0.82)",
                display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center",
                zIndex:10, cursor:"pointer", padding:"8px",
              }}>
                {imgUrl && (
                  <img src={imgUrl} alt={selected.name}
                    style={{
                      width:"58%", maxHeight:"55%",
                      aspectRatio:"5/7", objectFit:"contain",
                      borderRadius:10,
                      boxShadow:`0 8px 40px rgba(0,0,0,0.9), 0 0 20px ${statusColor}33`,
                    }}
                  />
                )}
                <div style={{ marginTop:8, textAlign:"center", padding:"0 8px", maxWidth:"100%" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#fff" }}>
                    {LANG_FLAG[selected.lang]} {selected.name}
                  </div>
                  <div style={{ fontSize:10, color:T.textMuted, marginTop:2 }}>{selected.set}</div>
                  <div style={{
                    display:"inline-flex", alignItems:"center", gap:4, marginTop:5,
                    background:`${statusColor}18`, border:`1px solid ${statusColor}44`,
                    borderRadius:5, padding:"2px 8px",
                  }}>
                    <span style={{ fontSize:10, fontWeight:600, color:statusColor }}>{statusLabel}</span>
                  </div>
                  {lastVal && (
                    <div style={{ display:"flex", justifyContent:"center", gap:10, marginTop:6 }}>
                      <span style={{ fontSize:10, color:"#60a5fa" }}>NM {lastVal.nm}€</span>
                      <span style={{ fontSize:10, color:"#fb923c" }}>PSA 9 {lastVal.psa9}€</span>
                      <span style={{ fontSize:10, color:"#4ade80", fontWeight:700 }}>PSA 10 {lastVal.psa10}€</span>
                    </div>
                  )}
                  {selected.note && (
                    <div style={{ fontSize:9, color:T.textMuted, marginTop:4, lineHeight:1.4, maxWidth:260 }}>{selected.note}</div>
                  )}
                </div>
              </div>
            );
          })()}
        </div>
      </div>

      <div style={{ textAlign:"center", fontSize:10, color:T.textMuted, marginBottom:14 }}>
        {langCards.length} carte{langCards.length!==1?"s":""} · cliquer pour prix PSA
      </div>

      {/* Panneau détail carte sélectionnée */}
      {selected && (
        <div style={{ ...css.card, border:`1px solid ${curColor}55`, marginBottom:8 }}>

          <ImageHelp card={selected} imgData={imgCache[selected.id]} onSetOverride={setOverride} color={curColor} force={imgEdit} />
          <div style={{ marginTop: 8, display: "flex", justifyContent: "flex-end" }}>
            <button onClick={() => setImgEdit(v => !v)} style={{ ...css.btn(), padding: "4px 10px", fontSize: 10 }}>
              🖼️ {imgEdit ? "Fermer" : "Changer l'illustration"}
            </button>
          </div>

          {/* Prix d'achat + RAW + plus-value */}
          <EconoStrip card={selected} rawEntry={prices?.[selected.id]} store={purchase} onSetPurchase={setP}
            refValue={histData ? histData[histData.length - 1][(meta?.grade || "").includes("10") ? "psa10" : "psa9"] : null}
            color={curColor} />
          {prices?.[selected.id] && (
            <div style={{ fontSize:9.5, color:T.textMuted, marginTop:7, textAlign:"center" }}>
              RAW {prices[selected.id].source === "cardmarket" ? "CardMarket" : "TCGplayer"} (EN indicatif) · {relTime(prices[selected.id].ts)}
            </div>
          )}

          {histData ? (
            <>
              {/* Sélecteur grade */}
              <div style={{ display:"flex", gap:4, marginBottom:12, marginTop:12 }}>
                {linesCfg.map(l => (
                  <button key={l.key} onClick={() => setGrade(l.key)} style={{
                    flex:1, fontSize:11, padding:"4px 4px", borderRadius:6, cursor:"pointer",
                    fontFamily:"inherit", fontWeight: grade === l.key ? 700 : 400,
                    background: grade === l.key ? `${l.color}18` : "transparent",
                    color: grade === l.key ? l.color : T.textMuted,
                    border:`1px solid ${grade === l.key ? l.color + "55" : T.border}`,
                  }}>{l.label}</button>
                ))}
              </div>

              {/* Valeurs actuelles */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginBottom:14 }}>
                {linesCfg.map(l => {
                  const last = histData[histData.length - 1];
                  const prev = histData.length > 1 ? histData[histData.length - 2] : last;
                  const diff = last[l.key] - prev[l.key];
                  return (
                    <div key={l.key} style={{ background:`${l.color}10`, border:`1px solid ${l.color}30`, borderRadius:8, padding:"8px 6px", textAlign:"center", outline: grade === l.key ? `2px solid ${l.color}55` : "none" }}>

                      <div style={{ fontSize:8, color:l.color, opacity:0.7, marginTop:1, textTransform:"uppercase" }}>{l.label}</div>
                      <div style={{ fontSize:10, color: diff >= 0 ? "#4ade80" : "#f87171", marginTop:2, fontWeight:600 }}>
                        {diff >= 0 ? "+" : ""}{diff}€
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Graphique */}
              <SvgLineChart data={histData} lines={grade === "all" ? linesCfg : linesCfg.filter(l => l.key === grade)} />

              {/* Cours eBay live */}
              {selected.ebayQuery && (
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  {livePrices[selected.id] && (
                    <div style={{ flex:1, fontSize:11, color:T.textMuted }}>
                      eBay NM : <span style={{ color:"#4ade80", fontWeight:600 }}>~{livePrices[selected.id].avgEur}€</span>
                      <span style={{ opacity:0.5, marginLeft:4 }}>· {relTime(livePrices[selected.id].ts)}</span>
                      <span style={{ opacity:0.4, marginLeft:4 }}>(min {livePrices[selected.id].minEur}€ / max {livePrices[selected.id].maxEur}€)</span>
                    </div>
                  )}
                  <button onClick={() => loadLive(selected)} disabled={loadingId === selected.id}
                    style={{ ...css.btn(), padding:"4px 12px", fontSize:10, opacity: loadingId === selected.id ? 0.5 : 1 }}>
                    {loadingId === selected.id ? "⏳…" : "⚡ Cours eBay"}
                  </button>
                </div>
              )}
            </>
          ) : (
            <div style={{ textAlign:"center", padding:"20px 10px", color:T.textMuted, fontSize:11, lineHeight:1.6 }}>
              {selected.status === "à grader"
                ? "📬 En attente d'envoi. Les données de prix s'afficheront après réception du grade PSA."
                : "⏳ Carte en cours de grading. Résultat attendu prochainement."}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            <input placeholder="🔍 Rechercher une carte…" value={search} onChange={e => setSearch(e.target.value)} style={{ ...css.input, flex: 1, minWidth: 120, borderRadius: 20 }} />
            <select value={filterP} onChange={e => setFilterP(e.target.value)} style={{ ...css.input, width: "auto", flex: "0 0 auto" }}>
              <option value="all">Toutes priorités</option>
              <option value="1">P1</option><option value="2">P2</option><option value="3">P3</option>
              <option value="4">P4</option><option value="5">Collection</option>
            </select>
            <select value={filterT} onChange={e => setFilterT(e.target.value)} style={{ ...css.input, width: "auto", flex: "0 0 auto" }}>
              <option value="all">Tous types</option>
              <option value="vintage">Vintage</option><option value="modern">Modern</option><option value="collector">Collection</option><option value="anniv30">30e Anniversaire</option>
            </select>
          </div>
          {showAddWatch && <AddCardForm onAdd={addWatch} onClose={() => setShowAddWatch(false)} />}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 11, color: T.textMuted }}>{filtered.length} carte{filtered.length > 1 ? "s" : ""} · cliquer pour prix live</span>
            {!showAddWatch && <button onClick={() => setShowAddWatch(true)} style={css.btn("primary")}>+ Ajouter</button>}
          </div>
          {filtered.map(c => <CardRow key={c.id} card={c} onDelete={delWatch} />)}
        </div>
      )}

      <div style={{ marginTop: 28, paddingTop: 14, borderTop: `1px solid ${T.border}`, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
        <div style={{ opacity: 0.5 }}><LogoMark size={26} /></div>
        <div style={{ fontSize: 10, color: T.textMuted, textAlign: "center", letterSpacing: "0.04em" }}>
          PokéTracker · TCGdex · pokemontcg.io · données sauvegardées localement
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PokeTracker />);
</script>
</body>
</html>
