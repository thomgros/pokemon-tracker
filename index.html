// ── localStorage ──────────────────────────────────────────────────────────────

function useStorage(key, fallback) {
  const [val, setVal] = useState(() => {
    try {
      const ls = localStorage.getItem(key);
      if (!ls) return fallback;
      const stored = JSON.parse(ls);
      if (!Array.isArray(stored) || stored.length === 0) return fallback;
      const storedIds = new Set(stored.map(i => i.id));
      const newDefaults = fallback.filter(i => !storedIds.has(i.id));
      return [...stored, ...newDefaults];
    } catch {
      try { localStorage.removeItem(key); } catch {}
      return fallback;
    }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }, [key, val]);
  return [val, setVal, () => {
    try { localStorage.removeItem(key); } catch {}
    setVal(fallback);
  }];
}

function useLs(key, fallback) {
  const [val, setVal] = useState(() => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ── eBay API ──────────────────────────────────────────────────────────────────

async function fetchEbayPrices(query) {
  try {
    const url = `https://svcs.ebay.com/services/search/FindingService/v1?OPERATION-NAME=findCompletedItems&SERVICE-VERSION=1.0.0&SECURITY-APPNAME=${EBAY_APP_ID}&RESPONSE-DATA-FORMAT=JSON&REST-PAYLOAD&keywords=${encodeURIComponent(query)}&itemFilter(0).name=SoldItemsOnly&itemFilter(0).value=true&itemFilter(1).name=Condition&itemFilter(1).value=3000&sortOrder=EndTimeSoonest&paginationInput.entriesPerPage=5`;
    const res = await fetch(url);
    if (!res.ok) return { corsBlocked: true };
    const data = await res.json();
    const items = data?.findCompletedItemsResponse?.[0]?.searchResult?.[0]?.item;
    if (!items?.length) return null;
    const prices = items.map(i => parseFloat(i.sellingStatus?.[0]?.currentPrice?.[0]?.__value__)).filter(p => p > 0);
    if (!prices.length) return null;
    const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
    return {
      avg: avg.toFixed(0),
      avgEur: Math.round(avg * USD_TO_EUR),
      min: Math.min(...prices).toFixed(0),
      minEur: Math.round(Math.min(...prices) * USD_TO_EUR),
      max: Math.max(...prices).toFixed(0),
      maxEur: Math.round(Math.max(...prices) * USD_TO_EUR),
      count: prices.length,
      ts: Date.now(),
    };
  } catch (e) {
    return { corsBlocked: true };
  }
}

const toEur = usd => Math.round(parseFloat(usd) * USD_TO_EUR);
const fmt   = (n, d = 0) => Number(n).toFixed(d);
const relTime = ts => {
  if (!ts) return "";
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return "à l'instant";
  if (m < 60) return `il y a ${m}min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h / 24)}j`;
};

  const pc = PRIORITY_CONFIG[card.priority];

    if (loaded) return;
    setLoading(true);
    setPrice(await fetchEbayPrices(card.ebayQuery));
    setLoading(false);
    setLoaded(true);
  }, [card.ebayQuery, loaded]);

  useEffect(() => { if (open && !loaded) load(); }, [open, loaded, load]);

// ── SvgLineChart ──────────────────────────────────────────────────────────────

function SvgLineChart({ data, lines }) {
  const W = 320, H = 160, PAD = { top: 10, right: 10, bottom: 24, left: 44 };
  const IW = W - PAD.left - PAD.right;
  const IH = H - PAD.top - PAD.bottom;
  const [hover, setHover] = useState(null);

  const allVals = lines.flatMap(l => data.map(d => d[l.key]));
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const range = maxV - minV || 1;

  const xPos = i => PAD.left + (i / (data.length - 1)) * IW;
  const yPos = v => PAD.top + IH - ((v - minV) / range) * IH;

  const pathD = (key) =>
    data.map((d, i) => `${i === 0 ? "M" : "L"}${xPos(i).toFixed(1)},${yPos(d[key]).toFixed(1)}`).join(" ");

  const yTicks = [minV, minV + range * 0.5, maxV].map(v => Math.round(v));

  return (
    <div style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${T.border}`, borderRadius: 12, padding: "12px 0 8px", marginBottom: 24, position: "relative" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}
        onMouseLeave={() => setHover(null)}>
        {/* Grid */}
        {yTicks.map((v, i) => (
          <g key={i}>
            <line x1={PAD.left} x2={W - PAD.right} y1={yPos(v)} y2={yPos(v)} stroke="rgba(255,255,255,0.05)" strokeDasharray="3,3" />
            <text x={PAD.left - 6} y={yPos(v) + 4} textAnchor="end" fontSize={9} fill={T.textMuted}>{v}€</text>
          </g>
        ))}
        {/* X labels */}
        {data.map((d, i) => (
          <text key={i} x={xPos(i)} y={H - 4} textAnchor="middle" fontSize={9} fill={T.textMuted}>{d.date}</text>
        ))}
        {/* Lines */}
        {lines.map(l => (
          <path key={l.key} d={pathD(l.key)} fill="none" stroke={l.color} strokeWidth={2} strokeLinejoin="round" />
        ))}
        {/* Dots + hover zones */}
        {data.map((d, i) => (
          <g key={i} onMouseEnter={() => setHover(i)} style={{ cursor: "crosshair" }}>
            <rect x={xPos(i) - 16} y={PAD.top} width={32} height={IH} fill="transparent" />
            {lines.map(l => (
              <circle key={l.key} cx={xPos(i)} cy={yPos(d[l.key])} r={hover === i ? 5 : 3} fill={l.color} />
            ))}
          </g>
        ))}
        {/* Hover vertical line */}
        {hover !== null && (
          <line x1={xPos(hover)} x2={xPos(hover)} y1={PAD.top} y2={PAD.top + IH} stroke="rgba(255,255,255,0.15)" strokeWidth={1} />
        )}
      </svg>
      {/* Tooltip */}
      {hover !== null && (
        <div style={{ position: "absolute", top: 10, right: 14, background: T.surface, border: `1px solid ${T.borderMid}`, borderRadius: 8, padding: "6px 10px", fontSize: 11, pointerEvents: "none" }}>
          <div style={{ color: T.text, fontWeight: 600, marginBottom: 4 }}>{data[hover].date}</div>
          {lines.map(l => (
            <div key={l.key} style={{ color: l.color, fontVariantNumeric: "tabular-nums" }}>{l.label} : {data[hover][l.key]}€</div>
          ))}
        </div>
      )}
      {/* Legend */}
      {lines.length > 1 && (
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 4 }}>
          {lines.map(l => (
            <div key={l.key} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10, color: l.color }}>
              <div style={{ width: 16, height: 2, background: l.color, borderRadius: 1 }} />
              {l.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Chargement d'images via pokemontcg.io ────────────────────────────────────

function useCardImages(cards) {
  const CACHE_KEY = "pk_img_v31";
  const [cache, setCache] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CACHE_KEY) || "{}"); } catch { return {}; }
  });

  useEffect(() => {
    const toFetch = cards.filter(c => !c.img && cache[c.id] === undefined);
    if (!toFetch.length) return;
    let alive = true;
    const save = (id, img) => setCache(p => {
      const n = { ...p, [id]: img };
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(n)); } catch {}
        try { ['v22','v23','v24'].forEach(v => localStorage.removeItem(`pk_img_${v}`)); } catch {}
      return n;
    });

    // Teste si une URL charge en tant qu'image (ne nécessite pas CORS)
    const tryImg = (url, ms = 6000) => new Promise(res => {
      const t = new Image();
      t.referrerPolicy = "no-referrer";   // contourne la protection hotlink (autorise les requêtes sans Referer)
      const timer = setTimeout(() => { t.src = ""; res(false); }, ms);
      t.onload  = () => { clearTimeout(timer); res(true); };
      t.onerror = () => { clearTimeout(timer); res(false); };
      t.src = url;
    });

    // Extrait le numéro JP de la carte depuis son fullName ("Ho-Oh ex 021/193" → "021")
    const jpNumOf = card => (card.fullName?.match(/\b(\d+)\//) ?? [])[1] ?? null;

    (async () => {
      outer: for (const card of toFetch) {
        if (!alive) break;

        // ── FR : cascade de sources ───────────────────────────────────────────
        if (card.lang === 'FR') {
          const m = card.apiQ?.match(/set\.id:(\S+)\s+number:(\d+)/);
          if (m) {
            const numPad = m[2].padStart(3, '0');   // "55" → "055"
            const numRaw = parseInt(m[2]).toString(); // "055" → "55" (sécurité)

            // 1a. TCGdex ME series FR — essaie avec et sans padding
            const meMap = {'me1':'me01','me2':'me02','me3':'me03','me4':'me04','me2pt5':'me02.5','mef':'mep'};
            if (meMap[m[1]]) {
              for (const n of [numPad, numRaw]) {
                const url = `https://assets.tcgdex.net/fr/me/${meMap[m[1]]}/${n}/high.webp`;
                if (await tryImg(url)) { save(card.id, url); continue outer; }
              }
            }

            // 1a2. LimitlessTCG CDN FR — pour sets ME (fallback secret rares non indexés sur TCGdex)
            const ltcgMeMap = { me1:'M1', me2:'M2', me2pt5:'M2a', me3:'M3', me4:'M4' };
            if (ltcgMeMap[m[1]]) {
              const ltcgSet = ltcgMeMap[m[1]];
              const n = parseInt(m[2]);
              for (const v of ['R', 'RR', 'AR', 'SAR', 'SR', 'SIR', 'IR', 'UR', 'HR']) {
                const url = `https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/${ltcgSet}/${ltcgSet}_${n}_${v}_FR_LG.png`;
                if (await tryImg(url, 2000)) { save(card.id, url); continue outer; }
              }
            }

            // 1b. TCGdex SV standard sets FR (sv1-sv9+)
            const svFrMap = {
              'sv1':'SV1','sv2':'SV2','sv3':'SV3','sv3pt5':'SV3pt5',
              'sv4':'SV4','sv4pt5':'SV4pt5','sv5':'SV5','sv6':'SV6',
              'sv6pt5':'SV6pt5','sv7':'SV7','sv8':'SV8','sv8pt5':'SV8pt5','sv9':'SV9',
            };
            if (svFrMap[m[1]]) {
              for (const n of [numPad, numRaw]) {
                const url = `https://assets.tcgdex.net/fr/SV/${svFrMap[m[1]]}/${n}/high.webp`;
                if (await tryImg(url)) { save(card.id, url); continue outer; }
              }
            }

            // 1c. LimitlessTCG CDN FR — pour sets SV standard (même format que JP mais _FR_)
            if (svFrMap[m[1]]) {
              const ltcgSet = svFrMap[m[1]];
              const n = parseInt(m[2]);
              for (const v of ['R', 'RR', 'AR', 'SAR', 'SR', 'SIR']) {
                const url = `https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/${ltcgSet}/${ltcgSet}_${n}_${v}_FR_LG.png`;
                if (await tryImg(url, 2000)) { save(card.id, url); continue outer; }
              }
            }
          }
        }

        // ── JP : cascade de sources ───────────────────────────────────────────
        if (card.lang === 'JP') {
          const num = jpNumOf(card);           // numéro JP brut (ex: "021", "159")
          const setM = card.apiQ?.match(/set\.id:(\S+)/);
          const setId = setM?.[1];

          // Table de correspondance → TCGdex (serie / setId)
          const tcgdexMap = {
            me2pt5:{ serie: 'M',  set: 'M2a'   },  // M2α Ascended Heroes
            me3:   { serie: 'M',  set: 'M3'    },
            me4:   { serie: 'M',  set: 'M4'    },
            sv11b: { serie: 'SV', set: 'SV11B' },
            sv4k:  { serie: 'SV', set: 'SV4K'  },
            sv2p:  { serie: 'SV', set: 'SV2P'  },
          };
          // Codes dossier sur pokemon-card.com (fallback si TCGdex n'a pas encore les images)
          const pokemonCardCode = { me2pt5: 'M2a', me4: 'M4', me3: 'M3', sv11b: 'SV11B' };

          // 1. jpImg codé en dur sur la carte (direct pokemon-card.com ou TCGdex)
          if (card.jpImg && await tryImg(card.jpImg)) {
            save(card.id, card.jpImg); continue outer;
          }

          // 2. TCGdex CDN directement (avec le bon chemin série)
          if (setId && tcgdexMap[setId] && num) {
            const { serie, set } = tcgdexMap[setId];
            const localId = num.padStart(3, '0');
            const cdnUrl = `https://assets.tcgdex.net/ja/${serie}/${set}/${localId}/high.webp`;
            if (await tryImg(cdnUrl)) { save(card.id, cdnUrl); continue outer; }

            // 2b. Variante M2.5 si M2a échoue (nom alternatif TCGdex pour M2α)
            if (setId === 'me2pt5') {
              const alt = `https://assets.tcgdex.net/ja/M/M2.5/${localId}/high.webp`;
              if (await tryImg(alt)) { save(card.id, alt); continue outer; }
            }

            // 3. TCGdex API (retourne l'URL exacte même si localId diffère)
            try {
              const r = await fetch(`https://api.tcgdex.net/v2/ja/cards/${set}-${localId}`);
              if (r.ok) {
                const d = await r.json();
                if (d?.image) {
                  const apiUrl = `${d.image}/high.webp`;
                  if (await tryImg(apiUrl)) { save(card.id, apiUrl); continue outer; }
                }
              }
            } catch {}
          }

          // 3.5. LimitlessTCG CDN — format confirmé : tpc/{SET}/{SET}_{num}_{variant}_JP_LG.png
          const ltcgMap = { me2pt5:'M2a', me3:'M3', me4:'M4', sv11b:'SV11B', sv4k:'SV4K', sv2p:'SV2P', sv2a:'SV2a' };
          if (setId && ltcgMap[setId] && num) {
            const ltcgSet = ltcgMap[setId];
            const n = parseInt(num, 10);
            // Essaie le code principal puis M2.5 comme alternative pour M2α
            const ltcgSets = setId === 'me2pt5' ? [ltcgSet, 'M2.5'] : [ltcgSet];
            for (const s of ltcgSets) {
              const base = `https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/${s}/${s}_${n}`;
              for (const v of ['R', 'RR', 'AR', 'SAR', 'SR', 'SIR', 'IR']) {
                const url = `${base}_${v}_JP_LG.png`;
                if (await tryImg(url, 2000)) { save(card.id, url); continue outer; }
              }
            }
          }

          // 3.6. Images hébergées dans le repo GitHub (via workflow Actions)
          if (setId && pokemonCardCode[setId] && num) {
            const repoUrl = `https://raw.githubusercontent.com/thomgros/pokemon-tracker/main/cards/${pokemonCardCode[setId]}/${num}.jpg`;
            if (await tryImg(repoUrl)) { save(card.id, repoUrl); continue outer; }
          }

          // 4. pokemon-card.com direct, sans Referer (referrerPolicy="no-referrer" sur tryImg)
          if (setId && pokemonCardCode[setId] && num) {
            const code = pokemonCardCode[setId];
            const base = `https://www.pokemon-card.com/assets/images/card_images/large/${code}/${num}.jpg`;
            if (await tryImg(base)) { save(card.id, base); continue outer; }

            // 4b. Wayback Machine (archive.org) — pas de protection hotlink
            const archiveUrl = `https://web.archive.org/web/2im_/${base}`;
            if (await tryImg(archiveUrl, 8000)) { save(card.id, archiveUrl); continue outer; }
          }

          // 5. Fallback JP : pokemontcg.io API (illustration EN, meilleur que rien)
          if (card.apiQ) {
            try {
              const r = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(card.apiQ)}&pageSize=5&select=images`);
              if (r.ok) {
                const d = await r.json();
                const img = d?.data?.[0]?.images?.large ?? null;
                if (img) { save(card.id, img); continue outer; }
              }
            } catch {}
          }

          save(card.id, null);
          await new Promise(r => setTimeout(r, 100));
          continue outer;
        }

        // ── EN : CDN pokemontcg.io direct (évite l'appel API) ────────────────
        const cdnM = card.apiQ?.match(/set\.id:(\S+)\s+number:(\d+)/);
        if (cdnM) {
          const setId = cdnM[1], num = parseInt(cdnM[2]);
          if (!['me2pt5','me3','me4','mef','sv11b','sv4k','sv2p'].includes(setId)) {
            save(card.id, `https://images.pokemontcg.io/${setId}/${num}_hires.png`);
            continue;
          }
        }

        // ── Fallback : pokemontcg.io API ─────────────────────────────────────
        let query;
        if (card.apiQ) {
          query = card.apiQ;
        } else {
          const m = card.fullName?.match(/\b(\d+)\//);
          if (!m) { save(card.id, null); continue; }
          query = `name:"${card.name}" number:${parseInt(m[1], 10)}`;
        }
        try {
          const r = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(query)}&pageSize=5&select=images`);
          if (r.ok) {
            const d = await r.json();
            const img = d?.data?.[0]?.images?.large ?? null;
            save(card.id, img);
            if (img) { await new Promise(r => setTimeout(r, 200)); continue; }
          }
        } catch {}
        save(card.id, null);
        await new Promise(r => setTimeout(r, 100));
      }
    })();
    return () => { alive = false; };
  }, [cards.map(c => c.id).join(",")]);

  return cache;
}

function CardSlot({ card, imgSrc, loading, selected, color, onClick }) {
  const [err, setErr] = useState(false);
  const showImg = imgSrc && !err;
  return (
    <div onClick={onClick} style={{
      aspectRatio: "5/7", borderRadius: 7, overflow: "hidden",
      background: card ? "rgba(0,0,0,0.22)" : "rgba(0,0,0,0.15)",
      border: card
        ? `2px solid ${selected ? T.accent : color + "44"}`
        : "2px dashed rgba(255,255,255,0.06)",
      cursor: card ? "pointer" : "default",
      boxShadow: card ? "0 4px 12px rgba(0,0,0,0.7)" : "none",
      transform: selected ? "scale(1.06)" : "scale(1)",
      transition: "transform 0.15s, border-color 0.15s",
      position: "relative", display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      {card && showImg && (
        <img src={imgSrc} alt={card.name}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }}
          onError={() => setErr(true)}
        />
      )}
      {card && !showImg && (
        <div style={{ padding: 4, textAlign: "center", zIndex: 1 }}>
          {loading
            ? <div style={{ fontSize: 16, opacity: 0.2 }}>⏳</div>
            : <>
              <div style={{ fontSize: 9, color: T.textSub, fontWeight: 600, lineHeight: 1.3, wordBreak: "break-word" }}>{card.name}</div>

}

            }} />
          ))}

        <div style={{
          flex: 1,
          background: "linear-gradient(160deg, #1d1208 0%, #261506 60%, #1a1005 100%)",
          padding: "12px 12px 12px 8px",
        }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gridTemplateRows: "repeat(3, 1fr)", gap: 7 }}>

              {selected.status === "à grader"

function PokemonTracker() {
  const [watchList, setWatchList, resetWatch] = useStorage("pk_watch", DEFAULT_WATCH);
  const [ownedList, setOwnedList, resetOwned] = useStorage("pk_owned_v4", DEFAULT_OWNED);
  const [tab, setTab]             = useState("watch");
  const [filterP, setFilterP]     = useState("all");
  const [filterT, setFilterT]     = useState("all");
  const [search, setSearch]       = useState("");
  const [showAddWatch, setShowAddWatch] = useState(false);
  const [showAddOwned, setShowAddOwned] = useState(false);

  const totalOwned    = ownedList.filter(c => c.price > 0).reduce((s, c) => s + c.price, 0);
  const gradingCount  = ownedList.filter(c => c.status === "grading").length;
  const transitCount  = ownedList.filter(c => c.status === "transit").length;

  const filtered = watchList.filter(c => {
    if (filterP !== "all" && c.priority !== parseInt(filterP)) return false;
    if (filterT !== "all" && c.type !== filterT) return false;
    if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const addWatch = c => setWatchList(p => [...p, c]);
  const delWatch = id => setWatchList(p => p.filter(c => c.id !== id));
  const addOwned = c => setOwnedList(p => [...p, c]);
  const delOwned = id => setOwnedList(p => p.filter(c => c.id !== id));

  const NAV = [
    { id: "watch",      label: "Surveiller", icon: "🔍" },
    { id: "owned",      label: "Collection", icon: "📦" },
    { id: "classeur",   label: "Classeur",   icon: "📒" },
    { id: "urgent",     label: "Urgent",     icon: "⚡" },
    { id: "cours",      label: "Cours",      icon: "📈" },
    { id: "calendrier", label: "Calendrier", icon: "📅" },
    { id: "ressources", label: "Outils",     icon: "🛠️" },

  const statItems = [
    { label: "À surveiller", val: watchList.length, color: "#60a5fa", bg: "rgba(96,165,250,0.08)", border: "rgba(96,165,250,0.2)" },
    { label: "Investi",      val: `${Math.round(totalOwned)}€`, color: "#4ade80", bg: "rgba(74,222,128,0.08)", border: "rgba(74,222,128,0.2)" },

          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            <input placeholder="Rechercher…" value={search} onChange={e => setSearch(e.target.value)} style={{ ...css.input, flex: 1, minWidth: 120 }} />
            <select value={filterP} onChange={e => setFilterP(e.target.value)} style={{ ...css.input, width: "auto", flex: "0 0 auto" }}>
              <option value="all">Toutes priorités</option>
              <option value="1">P1</option><option value="2">P2</option><option value="3">P3</option>
              <option value="4">P4</option><option value="5">Collection</option>
            </select>
            <select value={filterT} onChange={e => setFilterT(e.target.value)} style={{ ...css.input, width: "auto", flex: "0 0 auto" }}>
              <option value="all">Tous types</option>
              <option value="vintage">Vintage</option><option value="modern">Modern</option><option value="collector">Collection</option><option value="anniv30">30e Anniversaire</option>
            </select>
          </div>
          {showAddWatch && <AddCardForm onAdd={addWatch} onClose={() => setShowAddWatch(false)} />}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 11, color: T.textMuted }}>{filtered.length} carte{filtered.length > 1 ? "s" : ""} · cliquer pour prix live</span>
            {!showAddWatch && <button onClick={() => setShowAddWatch(true)} style={css.btn("primary")}>+ Ajouter</button>}
          </div>
          {filtered.map(c => <CardRow key={c.id} card={c} onDelete={delWatch} />)}
        </div>
      )}

      {/* ── OWNED ── */}
      {tab === "owned" && (
        <div>
          <div style={{ background: "rgba(74,222,128,0.07)", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
            <div style={{ fontSize: 10, color: "#4ade80", marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 600 }}>Total investi</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: "#4ade80", fontVariantNumeric: "tabular-nums" }}>{totalOwned.toFixed(2)}€</div>
          </div>
          {showAddOwned && <AddOwnedForm onAdd={addOwned} onClose={() => setShowAddOwned(false)} />}
          {!showAddOwned && <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}><button onClick={() => setShowAddOwned(true)} style={css.btn("primary")}>+ Ajouter</button></div>}
          {["enchère", "transit", "grading", "à grader", "collection", "sealed"].map(status => {
            const cards = ownedList.filter(c => c.status === status);
            if (!cards.length) return null;
            const sc = STATUS_CONFIG[status];
            return (
              <div key={status} style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sc.color, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.1em" }}>
                  {sc.label} <span style={{ opacity: 0.5 }}>({cards.length})</span>
                </div>
                {cards.map(c => <OwnedCard key={c.id} card={c} onDelete={delOwned} />)}
              </div>
            );
          })}
        </div>
      )}

      {/* ── URGENT ── */}
      {tab === "urgent" && (
        <div>
          <div style={{ background: "rgba(251,146,60,0.08)", border: "1px solid rgba(251,146,60,0.3)", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#fb923c", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.06em" }}>Envoi grading — 11 mai ✅</div>
            <div style={{ fontSize: 13, color: "#fed7aa", marginBottom: 12 }}>
              Dracaufeu VMAX Rainbow · 2× Rosa's Encouragement · Mew ex · en cours de grading PSA chez PokéLoutre
            </div>
            <a href="https://pokeloutre.fr" target="_blank" rel="noopener noreferrer" style={{ ...css.link, color: "#fb923c" }}>pokeloutre.fr →</a>
          </div>
          <div style={{ background: "rgba(251,146,60,0.08)", border: "1px solid rgba(251,146,60,0.3)", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#fb923c", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.06em" }}>Envoi grading — 13 juin ✅</div>
            <div style={{ fontSize: 13, color: "#fed7aa", marginBottom: 12 }}>
              Évoli ex SIR 167/131 PRE · Flareon ex SIR 146/131 PRE · Pikachu &amp; Zekrom-GX 33/181 EN · Méga-Dracolosse ex 229/193 JP M2α · en grading PSA chez PokéLoutre
            </div>
            <a href="https://pokeloutre.fr" target="_blank" rel="noopener noreferrer" style={{ ...css.link, color: "#fb923c" }}>pokeloutre.fr →</a>
          </div>

          <div style={{ background: "rgba(74,222,128,0.07)", border: "1px solid rgba(74,222,128,0.25)", borderRadius: 12, padding: 16, marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#4ade80", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>✅ Reçu — Très bonne affaire</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: T.text }}>Mew ex SAR PSA 9 JP 205/165</div>
            <div style={{ display: "flex", gap: 16, margin: "8px 0", alignItems: "baseline" }}>
              <div>
                <div style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em" }}>Payé</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#4ade80", fontVariantNumeric: "tabular-nums" }}>256€</div>
              </div>
              <div style={{ color: T.textMuted }}>→</div>
              <div>
                <div style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em" }}>Valeur réelle</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: T.text, fontVariantNumeric: "tabular-nums" }}>~818€</div>
              </div>
            </div>
            <div style={{ fontSize: 12, color: "#86efac" }}>Plus-value latente : ~562€</div>
          </div>

          <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>Priorité 1 — à trouver</div>
          {watchList.filter(c => c.priority === 1).map(c => <CardRow key={c.id} card={c} onDelete={delWatch} />)}
        </div>
      )}

      {/* ── CLASSEUR ── */}
      {tab === "classeur" && <ClasseurTab />}

      {/* ── COURS ── */}
      {tab === "cours" && <CoursTab ownedList={ownedList} />}

      {/* ── CALENDRIER ── */}
      {tab === "calendrier" && <CalendrierTab />}

      {/* ── RESSOURCES ── */}
      {tab === "ressources" && <RessourcesTab />}

      <div style={{ marginTop: 24, paddingTop: 12, borderTop: `1px solid ${T.border}`, fontSize: 10, color: T.textMuted, textAlign: "center", letterSpacing: "0.04em", marginBottom: 80 }}>
        eBay Finding API · ventes USD · données sauvegardées localement
      </div>

      {/* ── Navigation fixe bas ── */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(10,10,15,0.97)", backdropFilter: "blur(12px)", borderTop: `1px solid ${T.border}`, zIndex: 100 }}>
        <div style={{ maxWidth: 700, margin: "0 auto", display: "flex", overflowX: "auto", WebkitOverflowScrolling: "touch", padding: "0 8px" }}>
          {NAV.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              background: "none", border: "none", cursor: "pointer",
              padding: "10px 14px 12px",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              fontFamily: "inherit", flexShrink: 0,
              borderTop: tab === t.id ? `2px solid ${T.accent}` : "2px solid transparent",
              transition: "all 0.15s",
            }}>
              <span style={{ fontSize: 18, lineHeight: 1 }}>{t.icon}</span>
              <span style={{ fontSize: 10, fontWeight: tab === t.id ? 600 : 400, color: tab === t.id ? T.accent : T.textMuted, whiteSpace: "nowrap" }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PokemonTracker />);
</script>
</body>
</html>
