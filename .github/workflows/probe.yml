name: Probe PriceCharting

# Test de faisabilité manuel (jetable) : vérifie si l'Action peut lire PriceCharting.
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Probe
        run: node scripts/fetch-prices.js --validate --sample 20
