name: Fetch JP Card Images

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download JP card images
        run: |
          mkdir -p cards/M3 cards/SV11B cards/M2a cards/M4

          download() {
            local set=$1
            local num=$2
            local target="https://www.pokemon-card.com/assets/images/card_images/large/${set}/${num}.jpg"
            local out="cards/${set}/${num}.jpg"

            try_url() {
              local url=$1
              local label=$2
              http_code=$(curl -s -o "$out" -w "%{http_code}" \
                -L --max-time 15 \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                "$url")
              size=$(stat -c%s "$out" 2>/dev/null || echo 0)
              if [ "$http_code" = "200" ] && [ "$size" -gt 5000 ]; then
                echo "  ✓ via $label (${size} bytes)"
                return 0
              else
                rm -f "$out"
                return 1
              fi
            }

            # 1. Direct avec Referer
            encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$target', safe=''))")
            if try_url "$target" "direct (Referer)" <<< "" 2>/dev/null || \
               curl -s -o "$out" -w "%{http_code}" -L --max-time 15 \
                 -H "Referer: https://www.pokemon-card.com/" \
                 -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 -H "Accept: image/webp,image/apng,image/*,*/*;q=0.8" \
                 "$target" | grep -q "200" && [ "$(stat -c%s "$out" 2>/dev/null || echo 0)" -gt 5000 ]; then
              size=$(stat -c%s "$out" 2>/dev/null || echo 0)
              if [ "$size" -gt 5000 ]; then echo "✓ ${set}/${num} via direct (${size}b)"; return 0; fi
              rm -f "$out"
            fi

            # 2. AllOrigins proxy
            encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$target', safe=''))")
            if try_url "https://api.allorigins.win/raw?url=${encoded}" "allorigins"; then
              echo "✓ ${set}/${num} via allorigins"; return 0
            fi

            # 3. corsproxy.io
            if try_url "https://corsproxy.io/?${encoded}" "corsproxy.io"; then
              echo "✓ ${set}/${num} via corsproxy"; return 0
            fi

            # 4. Wayback Machine (archive.org)
            wb_ts=$(curl -s "https://archive.org/wayback/available?url=${target}" | python3 -c "
import json,sys
try:
  d=json.load(sys.stdin)
  print(d.get('archived_snapshots',{}).get('closest',{}).get('timestamp',''))
except: print('')
")
            if [ -n "$wb_ts" ]; then
              if try_url "https://web.archive.org/web/${wb_ts}im_/${target}" "wayback"; then
                echo "✓ ${set}/${num} via wayback (${wb_ts})"; return 0
              fi
            fi

            echo "✗ ${set}/${num} — toutes les sources ont échoué"
          }

          echo "=== M3 - Nihil Zero ==="
          for n in 054 016 061 103 084 092 081 021 115; do download M3 $n; done

          echo "=== SV11B - Black Bolt ==="
          for n in 159 069 151; do download SV11B $n; done

          echo "=== M2a - Ascended Heroes ==="
          for n in 021 145 194 207 232 036; do download M2a $n; done

          echo "=== M4 - Ninja Spinner ==="
          for n in 063 113 107 071; do download M4 $n; done

          echo ""
          echo "=== Résultat final ==="
          find cards -name "*.jpg" | sort
          total=$(find cards -name "*.jpg" | wc -l)
          echo "Total : $total images"

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards/
          if git diff --cached --quiet; then
            echo "Aucune nouvelle image à committer."
          else
            git commit -m "feat: cache JP card images (M3/SV11B/M2a/M4)"
            git push
          fi
