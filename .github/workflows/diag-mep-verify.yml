name: Diagnostic - Verify MEP Image URLs
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Pokedexia CDN URLs and find MEP-007
        run: |
          set +e
          check_url() {
            local url=$1 label=$2
            http=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$url")
            if [ "$http" = "200" ]; then
              size=$(curl -s -o /tmp/img -L --max-time 10 "$url" && stat -c%s /tmp/img 2>/dev/null || echo 0)
              if [ "$size" -gt 3000 ]; then
                echo "  ✓ $label ($size b) $url"
                return 0
              else
                echo "  ✗ $label (too small: $size b) $url"
                return 1
              fi
            else
              echo "  ✗ $label (HTTP $http) $url"
              return 1
            fi
          }

          echo "=== Verifying Pokedexia CDN URLs ==="
          check_url "https://cdn.pokedexia.com/cards/me/promos-mega-evolution/cards/MEP-070-v2-high.webp" "Ptyranidur-070"
          check_url "https://cdn.pokedexia.com/cards/me/promos-mega-evolution/cards/MEP-080-high.webp" "Feunnec-080"
          check_url "https://cdn.pokedexia.com/cards/me/promos-mega-evolution/cards/MEP-046-v2-high.webp" "Germignon-046"
          check_url "https://cdn.pokedexia.com/cards/me/promos-mega-evolution/cards/MEP-047-v2-high.webp" "Hericendre-047"
          check_url "https://cdn.pokedexia.com/cards/me/promos-mega-evolution/cards/MEP-048-v2-high.webp" "Kaiminus-048"

          echo ""
          echo "=== Searching for MEP-007 (Mega-Zygarde ex) ==="
          for suffix in "high" "v2-high" "v1-high" "low" "v2-low"; do
            check_url "https://cdn.pokedexia.com/cards/me/promos-mega-evolution/cards/MEP-007-${suffix}.webp" "MEP-007-${suffix}"
          done

          echo ""
          echo "=== Try Pokedexia page for MEP-007 with different slugs ==="
          for slug in "mega-zygarde-ex-mep-007" "m-zygarde-ex-mep-007" "zygarde-ex-mep-007" "mega-zygarde-mep-007"; do
            html=$(curl -s -L --max-time 10 "https://pokedexia.com/fr/cartes-pokemon/extensions/promos-mega-evolution/${slug}")
            img=$(echo "$html" | grep -oP 'https://cdn\.pokedexia\.com[^"]+' | head -1)
            if [ -n "$img" ]; then
              echo "  $slug: $img"
              check_url "$img" "$slug"
            else
              status=$(echo "$html" | head -c 100)
              echo "  $slug: no image (${#html} chars)"
            fi
          done

          echo ""
          echo "=== Try PkmnCards EN images ==="
          check_url "https://pkmncards.com/wp-content/uploads/mebsp_en_080_std.png" "PkmnCards-EN-080"
          check_url "https://pkmncards.com/wp-content/uploads/mebsp_en_070_std.png" "PkmnCards-EN-070"
          for num in 007 046 047 048; do
            check_url "https://pkmncards.com/wp-content/uploads/mebsp_en_${num}_std.png" "PkmnCards-EN-${num}"
            check_url "https://pkmncards.com/wp-content/uploads/mebsp_en_${num}_std.jpg" "PkmnCards-EN-${num}-jpg"
          done

          echo ""
          echo "=== Pokedexia: list all MEP cards on set page ==="
          html=$(curl -s -L --max-time 15 "https://pokedexia.com/fr/cartes-pokemon/extensions/promos-mega-evolution")
          echo "$html" | grep -oP 'https://cdn\.pokedexia\.com/cards/me/promos-mega-evolution/cards/MEP-0[0-9]+[^"]+' | sort -u | head -20

          echo ""
          echo "=== DONE ==="
