name: Diagnostic - TCGdex Image Verify

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve real TCGdex set IDs by name
        run: |
          echo "=== FR sets list (searching for Mega Evolution era sets) ==="
          curl -s --max-time 20 "https://api.tcgdex.net/v2/fr/sets" -o fr_sets.json
          python3 -c "import json; sets=json.load(open('fr_sets.json')); needles=['chaos','perfect','méga','mega','faille','prisme','prismat','évo','evo','ascend','nihil','ninja','paldea','obsidienne','rivaux','destins']; [print(f\"{s.get('id')!r:20s} {s.get('name','')!r:50s} cardCount={s.get('cardCount')}\") for s in sets if any(n in s.get('name','').lower() for n in needles)]"
          echo ""
          echo "=== JA sets list (searching for Mega Evolution era / JP-exclusive sets) ==="
          curl -s --max-time 20 "https://api.tcgdex.net/v2/ja/sets" -o ja_sets.json
          python3 -c "import json; sets=json.load(open('ja_sets.json')); needles=['メガ','ナイト','零','エイト','黒い','古代','粘土','151','スカーレット']; [print(f\"{s.get('id')!r:20s} {s.get('name','')!r:30s} cardCount={s.get('cardCount')}\") for s in sets if any(n in s.get('name','') for n in needles)]"

          echo ""
          echo "=== FR full card list: searching by exact card name for the 4 unresolved sets ==="
          curl -s --max-time 60 "https://api.tcgdex.net/v2/fr/cards" -o fr_cards.json
          ls -la fr_cards.json
          python3 -c "import json; cards=json.load(open('fr_cards.json')); targets=['Millie','Mélodelfe','Florizarre','Desséliande','Pikachu','Zacian','Yveltal','Fragrain','Terraiste']; [print(f\"{c.get('id')!r:20s} {c.get('name','')!r:40s} localId={c.get('localId')!r}\") for c in cards if any(t in c.get('name','') for t in targets)]"

          echo ""
          echo "=== Direct ID confirmation: sv04-023 (Arboliva), sv09-139 (Dogrino), me03-062 (Miaouss/Meowth) ==="
          for cid in sv04-023 sv09-139 me03-062; do
            echo "-- fr/cards/${cid} --"
            curl -s --max-time 15 "https://api.tcgdex.net/v2/fr/cards/${cid}" -o /tmp/r.json; python3 -c "import json; d=json.load(open('/tmp/r.json')); print('name=',d.get('name'),'image=',d.get('image'))" 2>/dev/null || (echo "  (error/404) body:"; cat /tmp/r.json | head -c 200)
          done
          echo "-- en/cards/me03-062 --"
          curl -s --max-time 15 "https://api.tcgdex.net/v2/en/cards/me03-062" -o /tmp/r2.json; python3 -c "import json; d=json.load(open('/tmp/r2.json')); print('name=',d.get('name'),'image=',d.get('image'))" 2>/dev/null || (echo "  (error/404) body:"; cat /tmp/r2.json | head -c 200)

          echo ""
          echo "=== FR card list: searching for MEP promo cards by name (Feunnec, Tyrunt, Zygarde) ==="
          python3 -c "import json; cards=json.load(open('fr_cards.json')); targets=['Feunnec','Tyrunt','Zygarde']; [print(f\"{c.get('id')!r:20s} {c.get('name','')!r:40s} localId={c.get('localId')!r}\") for c in cards if any(t in c.get('name','') for t in targets)]"

      - name: Download TCGdex samples (JP + FR)
        run: |
          mkdir -p verify_tmp

          # Tier 1: CDN direct guess (assets.tcgdex.net/{lang}/{series}/{set}/{num}/high.webp)
          fetch_cdn() {
            local lang=$1
            local series=$2
            local set=$3
            local num=$4
            local label=$5
            local out="verify_tmp/${label}.webp"
            for n in "$num" "$(printf '%03d' "$((10#$num))")"; do
              url="https://assets.tcgdex.net/${lang}/${series}/${set}/${n}/high.webp"
              http_code=$(curl -s -o "$out" -w "%{http_code}" -L --max-time 15 "$url")
              size=$(stat -c%s "$out" 2>/dev/null || echo 0)
              if [ "$http_code" = "200" ] && [ "$size" -gt 5000 ]; then
                echo "✓ ${label} via CDN direct: ${url} (${size}b)"
                return 0
              fi
              rm -f "$out"
            done
            return 1
          }

          # Tier 2: TCGdex JSON API -> authoritative image base URL
          fetch_api() {
            local lang=$1
            local set=$2
            local num=$3
            local label=$4
            local out="verify_tmp/${label}.webp"
            for n in "$num" "$(printf '%03d' "$((10#$num))")"; do
              api_url="https://api.tcgdex.net/v2/${lang}/cards/${set}-${n}"
              json=$(curl -s --max-time 15 "$api_url")
              base=$(echo "$json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('image',''))" 2>/dev/null)
              if [ -n "$base" ]; then
                img_url="${base}/high.webp"
                http_code=$(curl -s -o "$out" -w "%{http_code}" -L --max-time 15 "$img_url")
                size=$(stat -c%s "$out" 2>/dev/null || echo 0)
                if [ "$http_code" = "200" ] && [ "$size" -gt 5000 ]; then
                  echo "✓ ${label} via API: ${api_url} -> ${img_url} (${size}b)"
                  return 0
                fi
                rm -f "$out"
              else
                echo "  (api ${api_url} -> aucune image, body: $(echo "$json" | head -c 200))"
              fi
            done
            return 1
          }

          fetch() {
            local lang=$1 series=$2 set=$3 num=$4 label=$5
            if fetch_cdn "$lang" "$series" "$set" "$num" "$label"; then return 0; fi
            if fetch_api "$lang" "$set" "$num" "$label"; then return 0; fi
            echo "✗ ${label} — échec total (lang=${lang} ${set}/${num})"
          }

          echo "=== JP samples ==="
          fetch ja M  M2a  021 jp_M2a_021_HoOh
          fetch ja M  M3   054 jp_M3_054_MegaArmure
          fetch ja M  M4   063 jp_M4_063_MegaDragmara
          fetch ja SV SV11B 159 jp_SV11B_159_Serperior
          fetch ja SV SV4K 067 jp_SV4K_067_Iwaparesu
          fetch ja SV SV2P 065 jp_SV2P_065_Ikirinco

          echo "=== FR samples ==="
          fetch fr M  M4  107 fr_M4_107_Millie
          fetch fr M  M1  155 fr_M1_155_MegaFlorizarre
          fetch fr M  M3  031 fr_M3_031_MegaMelodelfe
          fetch fr M  M2a 096 fr_M2a_096_Desseliande
          fetch fr SV SV5 051 fr_SV5_051_Pikachu
          fetch fr SV SV2 130 fr_SV2_130_Terraiste

          echo ""
          echo "=== Résultat ==="
          find verify_tmp -name "*.webp" | sort
          echo "Total : $(find verify_tmp -name '*.webp' | wc -l) images"

      - name: Commit samples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verify_tmp/
          if git diff --cached --quiet; then
            echo "Aucune image à committer."
          else
            git commit -m "diag: TCGdex JP/FR image verification samples (API fallback)"
            git push
          fi
