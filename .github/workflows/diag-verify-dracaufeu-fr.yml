name: Diagnostic - Verify Dracaufeu FR URLs
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify FR image candidates
        run: |
          set +e
          check_url() {
            local url=$1 label=$2
            http=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$url")
            if [ "$http" = "200" ]; then
              size=$(curl -s -o /tmp/img -L --max-time 10 "$url" && stat -c%s /tmp/img 2>/dev/null || echo 0)
              if [ "$size" -gt 3000 ]; then
                echo "  ✓ $label ($size b) $url"
                return 0
              else
                echo "  ✗ $label (too small: $size b) $url"
              fi
            else
              echo "  ✗ $label (HTTP $http) $url"
            fi
            return 1
          }

          echo "=== Candidate 1: PkmCards.fr FR scan ==="
          check_url "https://static.pkmcards.fr/cards/fr/cpa/image-cartes-a-collectionner-pokemon-card-game-tcg-pkmcards-cpa-fr-074-epee-et-bouclier-la-voie-du-maitre-dracaufeu-vmax.webp" "PkmCards-FR"

          echo ""
          echo "=== Candidate 2: TCGdex CDN FR ==="
          check_url "https://assets.tcgdex.net/fr/swsh/swsh3.5/74/high.webp" "TCGdex-FR-high"
          check_url "https://assets.tcgdex.net/fr/swsh/swsh3.5/74/low.webp" "TCGdex-FR-low"

          echo ""
          echo "=== Candidate 3: Pokedexia direct set listing ==="
          html=$(curl -s -L --max-time 15 "https://pokedexia.com/fr/cartes-pokemon/extensions/la-voie-du-maitre")
          echo "$html" | grep -oP 'https://cdn\.pokedexia\.com[^"]+' | sort -u | head -30
          # Check for card 74 or 074 specifically
          echo ""
          echo "--- Filtering for 74/074 ---"
          echo "$html" | grep -oP 'https://cdn\.pokedexia\.com[^"]+' | grep -i '7[4]' | sort -u

          echo ""
          echo "=== DONE ==="
